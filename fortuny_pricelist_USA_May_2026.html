  :root {
    --bg:        #FFFFFF;
    --ink:       #000000;
    --ink-mid:   #555555;
    --ink-soft:  #888888;
    --ink-faint: #B5B5B5;
    --rule:      #E5E5E5;
    --rule-soft: #F0F0F0;
    --hover:     #FAFAFA;
    --warn:      #A02828;
    --grotesk:    "Atlas Grotesk", Helvetica, Arial, sans-serif;
    --typewriter: "Atlas Typewriter", "Courier New", monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }

  body {
    font-family: var(--grotesk);
    font-weight: 400;
    font-size: 16px;
    line-height: 1.5;
    padding: 56px 32px 96px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container { max-width: 1040px; margin: 0 auto; }

  /* ────────────────  Header  ──────────────── */
  header {
    text-align: center;
    padding: 16px 0 48px;
  }
  .wordmark {
    display: inline-block;
    width: min(560px, 90%);
    height: auto;
    user-select: none;
  }
  .subline {
    font-family: var(--typewriter);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--ink-mid);
    margin-top: 28px;
    text-transform: uppercase;
  }
  .top-rule { height: 1px; background: var(--ink); margin: 44px 0 0; }

  /* ────────────────  Controls  ──────────────── */
  .controls { padding: 28px 0 0; }

  .categories {
    display: flex; justify-content: center; gap: 0;
    list-style: none; padding: 0; margin: 0 0 40px;
  }
  .cat-btn {
    background: none; border: none; cursor: pointer;
    font-family: var(--grotesk);
    font-size: 12px;
    letter-spacing: 0.28em;
    color: var(--ink-soft);
    padding: 14px 28px;
    position: relative;
    transition: color .2s ease;
    text-transform: uppercase;
  }
  .cat-btn:hover { color: var(--ink); }
  .cat-btn.active { color: var(--ink); }
  .cat-btn.active::after {
    content: ""; position: absolute; bottom: 6px; left: 50%;
    transform: translateX(-50%); width: 24px; height: 1px; background: var(--ink);
  }
  @media (max-width: 640px) {
    .categories { flex-wrap: wrap; }
    .cat-btn { padding: 12px 16px; font-size: 11px; letter-spacing: 0.22em; }
  }

  /* Search */
  .search-row {
    display: grid; grid-template-columns: 1fr;
    gap: 32px; align-items: center; margin-bottom: 56px;
  }
  @media (max-width: 720px) {
    .search-row { grid-template-columns: 1fr; gap: 20px; }
  }

  .search-field {
    position: relative; display: flex; align-items: center;
    border-bottom: 1px solid var(--ink); padding: 4px 0;
  }
  .search-icon {
    width: 16px; height: 16px; color: var(--ink);
    margin-right: 14px; flex-shrink: 0;
  }
  .search-input {
    width: 100%; background: transparent; border: none;
    padding: 12px 32px 12px 0;
    font-family: var(--grotesk);
    font-size: 17px;
    color: var(--ink);
  }
  .search-input::placeholder {
    color: var(--ink-faint);
    font-family: var(--typewriter);
    font-style: italic;
  }
  .search-input:focus { outline: none; }

  .clear-btn {
    position: absolute; right: 0; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--ink-soft);
    font-family: var(--grotesk);
    font-size: 20px;
    padding: 6px 10px; line-height: 1;
    opacity: 0; pointer-events: none;
    transition: opacity .15s, color .15s;
  }
  .clear-btn.visible { opacity: 1; pointer-events: auto; }
  .clear-btn:hover { color: var(--ink); }

  /* Results meta */
  .results-meta {
    display: flex; justify-content: space-between;
    align-items: baseline;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--ink);
  }
  .results-count {
    font-family: var(--grotesk);
    font-size: 12px;
    letter-spacing: 0.28em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .results-count em {
    font-style: normal;
    font-weight: 400;
  }
  .legend {
    font-family: var(--typewriter);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-mid);
    letter-spacing: 0.02em;
  }

  /* Results */
  .results { list-style: none; padding: 0; margin: 0; }

  .item {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 32px;
    padding: 22px 0;
    border-bottom: 1px solid var(--rule);
    align-items: center;
    transition: background .15s;
  }
  .item:hover { background: var(--hover); }
  @media (max-width: 640px) {
    .item { grid-template-columns: 1fr auto; gap: 6px 16px; }
    .item .sku-col { grid-column: 1 / -1; margin-bottom: 4px; }
  }

  /* SKU column — uses Typewriter for code-like feel */
  .sku-col {
    font-family: var(--typewriter);
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .sku-col .sku-label {
    display: block;
    font-family: var(--grotesk);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  /* Pattern / product name */
  .name-col .pattern {
    font-family: var(--grotesk);
    font-size: 20px;
    letter-spacing: 0.18em;
    color: var(--ink);
    line-height: 1.15;
    text-transform: uppercase;
  }
  .name-col .descr {
    font-family: var(--grotesk);
    font-style: italic;
    font-size: 16px;
    color: var(--ink-mid);
    margin-top: 6px;
  }
  .name-col .meta {
    font-family: var(--typewriter);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* Price */
  .price-col { text-align: right; white-space: nowrap; }
  .price-col .price-label {
    display: block;
    font-family: var(--grotesk);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .price-col .price-value {
    font-family: var(--grotesk);
    font-size: 30px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .price-col .price-value .currency {
    font-size: 16px;
    color: var(--ink-mid);
    margin-right: 4px;
  }
  .price-col .price-unit {
    font-family: var(--typewriter);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  /* Extra price tiers */
  .price-tiers {
    display: flex; justify-content: flex-end;
    gap: 28px; margin-top: 12px;
  }
  .price-tier { text-align: right; }
  .price-tier .t-label {
    font-family: var(--grotesk);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    display: block;
    margin-bottom: 2px;
    text-transform: uppercase;
  }
  .price-tier .t-val {
    font-family: var(--grotesk);
    font-size: 16px;
    color: var(--ink);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 96px 20px;
    color: var(--ink-soft);
  }
  .empty .empty-mark {
    font-family: var(--grotesk);
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--ink);
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .empty .empty-body {
    font-family: var(--typewriter);
    font-style: italic;
    font-size: 14px;
  }

  .more-notice {
    text-align: center; padding: 22px 12px;
    font-family: var(--typewriter);
    font-style: italic;
    color: var(--ink-soft);
    font-size: 13px;
    border-bottom: 1px solid var(--rule);
  }

  footer {
    margin-top: 72px;
    padding-top: 32px;
    border-top: 1px solid var(--ink);
    text-align: center;
  }
  .foot-mark {
    font-family: var(--grotesk);
    font-size: 11px;
    letter-spacing: 0.36em;
    color: var(--ink);
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .foot-text {
    font-family: var(--typewriter);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-mid);
    letter-spacing: 0.02em;
  }

  @media print {
    .search-row, .clear-btn { display: none; }
    body { padding: 16px; font-size: 12px; }
    .item { padding: 12px 0; page-break-inside: avoid; }
  }
</style>
</head>

<script>
(() => {
  const DATA = JSON.parse(document.getElementById("data").textContent);
  const search = document.getElementById("search");
  const clearBtn = document.getElementById("clearBtn");
  const resultsEl = document.getElementById("results");
  const countEl = document.getElementById("resultsCount");
  const legendEl = document.getElementById("legend");
  const catBtns = document.querySelectorAll(".cat-btn");

  let state = { category: "fabrics", query: "" };
  const RESULT_LIMIT = 80;

  const s = (v) => (v == null ? "" : String(v));
  const fmtUSD = (n) => n == null || isNaN(n) ? "&mdash;" :
    n.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  const fmtUSD2 = (n) => n == null || isNaN(n) ? "&mdash;" :
    n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const cap = (str) => str ? str.charAt(0).toUpperCase() + str.slice(1).toLowerCase() : "";

  function filter() {
    const q = state.query.trim().toLowerCase();
    const list = DATA[state.category] || [];
    if (!q) return list;
    return list.filter((it) => {
      if (state.category === "fabrics") {
        return s(it.sku).toLowerCase().includes(q) ||
               s(it.pattern).toLowerCase().includes(q) ||
               s(it.color).toLowerCase().includes(q);
      } else if (state.category === "bespoke") {
        return s(it.label).toLowerCase().includes(q);
      } else if (state.category === "cushion") {
        return s(it.fabricType).toLowerCase().includes(q) ||
               s(it.sizeUs).toLowerCase().includes(q) ||
               s(it.sizeCm).toLowerCase().includes(q);
      } else if (state.category === "home") {
        return s(it.sku).toLowerCase().includes(q) ||
               s(it.product).toLowerCase().includes(q) ||
               s(it.itemType).toLowerCase().includes(q) ||
               s(it.color).toLowerCase().includes(q) ||
               s(it.description).toLowerCase().includes(q) ||
               s(it.set).toLowerCase().includes(q) ||
               s(it.variant).toLowerCase().includes(q);
      } else if (state.category === "objet") {
        return s(it.sku).toLowerCase().includes(q) ||
               s(it.product).toLowerCase().includes(q) ||
               s(it.description).toLowerCase().includes(q) ||
               s(it.subcategory).toLowerCase().includes(q);
      } else {
        return s(it.product).toLowerCase().includes(q) ||
               s(it.variant).toLowerCase().includes(q);
      }
    });
  }

  function render() {
    const filtered = filter();
    const total = filtered.length;
    countEl.innerHTML = `<em>${total}</em> &nbsp;Item${total === 1 ? "" : "s"}`;

    const legends = {
      fabrics:   "Prices in USD per yard &middot; gross of customs &amp; freight",
      bespoke:   "Bespoke custom fabrics &middot; Prices in USD per yard &middot; volume tiers",
      cushion:   "Prices in USD per piece &middot; gross of customs &amp; freight",
      ftny:      "Prices in USD &middot; three channels: Ecomm / Trade / Distributor",
      home:      "Prices in USD &middot; gross of customs &amp; freight",
      objet:     "Prices in USD &middot; Trade = Retail (MSRP) &minus; 15%",
    };
    legendEl.innerHTML = legends[state.category];

    if (total === 0) {
      resultsEl.innerHTML = `
        <div class="empty">
          <div class="empty-mark">No results</div>
          <div class="empty-body">No items match your search.<br>
            Try a pattern name, a SKU, or a colour.</div>
        </div>`;
      return;
    }

    const items = filtered.slice(0, RESULT_LIMIT);
    resultsEl.innerHTML = items.map((it) => {
      if (state.category === "fabrics") return renderFabric(it);
      if (state.category === "bespoke") return renderBespoke(it);
      if (state.category === "cushion") return renderPillow(it);
      if (state.category === "home")    return renderHome(it);
      if (state.category === "objet")   return renderObjet(it);
      return renderLifestyle(it);
    }).join("");

    if (total > RESULT_LIMIT) {
      const more = document.createElement("li");
      more.className = "more-notice";
      more.textContent = `Showing the first ${RESULT_LIMIT} of ${total} matches — refine your search to narrow further.`;
      resultsEl.appendChild(more);
    }
  }

  function renderFabric(it) {
    const noPrice = it.price == null;

    return `
      <li class="item">
        <div class="sku-col">
          <span class="sku-label">SKU</span>${escapeHtml(s(it.sku))}
        </div>
        <div class="name-col">
          <div class="pattern">${escapeHtml(s(it.pattern))}</div>
          <div class="descr">${escapeHtml(cap(s(it.color)))}</div>
        </div>
        <div class="price-col">
          <span class="price-label">Trade</span>
          ${noPrice ? '<span class="price-value" style="color:var(--ink-faint);font-size:20px">N/A</span>' :
            `<span class="price-value"><span class="currency">$</span>${fmtUSD(it.price)}</span>`}
          <div class="price-unit">per yard</div>
        </div>
      </li>`;
  }

  function renderBespoke(it) {
    return `
      <li class="item">
        <div class="sku-col">
          <span class="sku-label">Type</span>Bespoke
        </div>
        <div class="name-col">
          <div class="pattern" style="font-size:18px">${escapeHtml(s(it.label))}</div>
        </div>
        <div class="price-col">
          <span class="price-label">Trade &middot; per yard</span>
          <div class="price-tiers">
            <div class="price-tier">
              <span class="t-label">20–39 yds</span>
              <span class="t-val">$ ${fmtUSD(it.p20_39)}</span>
            </div>
            <div class="price-tier">
              <span class="t-label">40–59 yds</span>
              <span class="t-val">$ ${fmtUSD(it.p40_59)}</span>
            </div>
            <div class="price-tier">
              <span class="t-label">60+ yds</span>
              <span class="t-val">$ ${fmtUSD(it.p60plus)}</span>
            </div>
          </div>
        </div>
      </li>`;
  }

  function renderPillow(it) {
    return `
      <li class="item">
        <div class="sku-col">
          <span class="sku-label">Size</span>${escapeHtml(s(it.sizeUs))}
        </div>
        <div class="name-col">
          <div class="pattern" style="font-size:18px">${escapeHtml(s(it.fabricType))}</div>
          <div class="meta">${escapeHtml(s(it.sizeUs))} &nbsp;&middot;&nbsp; ${escapeHtml(s(it.sizeCm))} cm</div>
        </div>
        <div class="price-col">
          <span class="price-label">Trade</span>
          <span class="price-value"><span class="currency">$</span>${fmtUSD(it.price)}</span>
          <div class="price-unit">per piece</div>
        </div>
      </li>`;
  }

  function renderLifestyle(it) {
    const variant = it.variant ? `<div class="meta">${escapeHtml(s(it.variant))}</div>` : "";
    const tiers = `
      <div class="price-tiers">
        <div class="price-tier">
          <span class="t-label">Ecomm</span>
          <span class="t-val">$ ${fmtUSD(it.ecomm)}</span>
        </div>
        <div class="price-tier">
          <span class="t-label">Distributor</span>
          <span class="t-val">$ ${fmtUSD(it.distributor)}</span>
        </div>
      </div>`;

    return `
      <li class="item">
        <div class="sku-col">
          <span class="sku-label">Cat.</span>${state.category === "ftny" ? "FTNY" : "Life"}
        </div>
        <div class="name-col">
          <div class="pattern" style="font-size:18px">${escapeHtml(s(it.product))}</div>
          ${variant}
        </div>
        <div class="price-col">
          <span class="price-label">Trade</span>
          <span class="price-value"><span class="currency">$</span>${fmtUSD(it.trade)}</span>
          ${tiers}
        </div>
      </li>`;
  }

  function renderHome(it) {
    // Lifestyle items merged under Home are detected by the `ecomm` field
    // and delegated to renderLifestyle for the 3-tier price display.
    if (it.ecomm != null) return renderLifestyle(it);

    const metaParts = [];
    if (it.size)     metaParts.push(escapeHtml(s(it.size)));
    if (it.material) metaParts.push(escapeHtml(s(it.material)));
    if (it.quantity) metaParts.push("Qty " + escapeHtml(s(it.quantity)));
    if (it.set)      metaParts.push(escapeHtml(s(it.set)));
    const metaHTML = metaParts.length ? `<div class="meta">${metaParts.join(" &middot; ")}</div>` : "";

    const descrText = it.color
      ? `${escapeHtml(s(it.color))} &mdash; ${escapeHtml(s(it.description))}`
      : escapeHtml(s(it.description));

    const tiers = `
      <div class="price-tiers">
        <div class="price-tier">
          <span class="t-label">Retail</span>
          <span class="t-val">$ ${fmtUSD(it.retail)}</span>
        </div>
      </div>`;

    return `
      <li class="item">
        <div class="sku-col">
          <span class="sku-label">SKU</span>${escapeHtml(s(it.sku))}
        </div>
        <div class="name-col">
          <div class="pattern" style="font-size:18px">${escapeHtml(s(it.itemType))}</div>
          <div class="descr">${escapeHtml(s(it.product))}</div>
          ${it.description ? `<div class="descr" style="font-size:14px">${descrText}</div>` : ""}
          ${metaHTML}
        </div>
        <div class="price-col">
          <span class="price-label">Trade</span>
          <span class="price-value"><span class="currency">$</span>${fmtUSD(it.trade)}</span>
          ${tiers}
        </div>
      </li>`;
  }

  function renderObjet(it) {
    const descrLine = it.description
      ? `<div class="descr" style="font-size:14px">${escapeHtml(s(it.description))}</div>`
      : "";
    const subcatLine = it.subcategory
      ? `<div class="meta">${escapeHtml(s(it.subcategory))}</div>`
      : "";
    const tiers = `
      <div class="price-tiers">
        <div class="price-tier">
          <span class="t-label">Retail (MSRP)</span>
          <span class="t-val">$ ${fmtUSD2(it.retail)}</span>
        </div>
      </div>`;
    return `
      <li class="item">
        <div class="sku-col">
          <span class="sku-label">Style</span>${escapeHtml(s(it.sku))}
        </div>
        <div class="name-col">
          <div class="pattern" style="font-size:18px">${escapeHtml(s(it.product))}</div>
          ${descrLine}
          ${subcatLine}
        </div>
        <div class="price-col">
          <span class="price-label">Trade &minus;15%</span>
          <span class="price-value"><span class="currency">$</span>${fmtUSD2(it.trade)}</span>
          ${tiers}
        </div>
      </li>`;
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  search.addEventListener("input", (e) => {
    state.query = e.target.value;
    clearBtn.classList.toggle("visible", !!state.query);
    render();
  });
  clearBtn.addEventListener("click", () => {
    search.value = ""; state.query = "";
    clearBtn.classList.remove("visible");
    search.focus(); render();
  });
  catBtns.forEach((btn) => {
    btn.addEventListener("click", () => {
      catBtns.forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      state.category = btn.dataset.cat;
      render();
    });
  });

  render();
  search.focus();
})();
</script>
</body>
</html>
